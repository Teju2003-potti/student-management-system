<script>

    function showAlert(message,type){

    document.getElementById("alertBox").innerHTML=
    `<div class="alert alert-${type} alert-dismissible fade show">
    ${message}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>`;

    }

    function loadStudents(){

    fetch("/students/pagination?page=0&size=20")
    .then(res=>res.json())
    .then(data=>{

    const table=document.getElementById("studentTable");

    table.innerHTML="";

    data.content.forEach(student=>{

    table.innerHTML+=`

    <tr>

    <td>${student.id}</td>
    <td>${student.name}</td>
    <td>${student.email}</td>

    <td>

    <button class="btn btn-success btn-sm btn-action"
    onclick="editStudent(${student.id},'${student.name}','${student.email}')">

    Edit

    </button>

    <button class="btn btn-danger btn-sm"
    onclick="deleteStudent(${student.id})">

    Delete

    </button>

    </td>

    </tr>

    `;

    });

    });

    }

    function addStudent(){

    const name=document.getElementById("name").value;
    const email=document.getElementById("email").value;

    fetch("/students",{

    method:"POST",

    headers:{
    "Content-Type":"application/json"
    },

    body:JSON.stringify({
    name:name,
    email:email
    })

    })
    .then(res=>res.json())
    .then(()=>{

    showAlert("Student added successfully","success");

    document.getElementById("name").value="";
    document.getElementById("email").value="";

    loadStudents();

    });

    }

    function deleteStudent(id){

    if(!confirm("Are you sure you want to delete this student?")){
    return;
    }

    fetch("/students/"+id,{
    method:"DELETE"
    })
    .then(()=>{
    showAlert("Student deleted successfully","danger");
    loadStudents();
    });

    }

    function editStudent(id,name,email){

    const newName=prompt("Enter new name",name);
    const newEmail=prompt("Enter new email",email);

    fetch("/students/"+id,{

    method:"PUT",

    headers:{
    "Content-Type":"application/json"
    },

    body:JSON.stringify({
    name:newName,
    email:newEmail
    })

    })
    .then(res=>res.json())
    .then(()=>{
    showAlert("Student updated successfully","warning");
    loadStudents();
    });

    }

    window.onload=loadStudents;

</script>
